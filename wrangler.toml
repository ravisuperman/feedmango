# ============================================================
# ⚙️  STEP 1 — CHANGE ONLY THIS SECTION TO REDEPLOY
# ============================================================
name = "sportsrip-main-worker"        # ← Your Cloudflare Worker name
main = "worker.js"
compatibility_date = "2024-03-25"

# ============================================================
# CRON TRIGGERS
# Schedule 1 (*/10): Fetch raw RSS from all sources → NEWS_KV
# Schedule 2 (5/10): Curate + OG enrich articles  → CURATED_KV
# ============================================================
[triggers]
crons = ["*/10 * * * *", "5/10 * * * *"]

# ============================================================
# KV NAMESPACE BINDINGS
# How to get IDs:
#   Cloudflare Dashboard → Workers & Pages → KV
#   → Click each namespace → Copy the Namespace ID
#
# Create 4 KV namespaces in Cloudflare (names are just labels):
#   1. sportsrip-news-kv          → paste its ID below as NEWS_KV
#   2. sportsrip-curated-kv       → paste its ID below as CURATED_KV
#   3. sportsrip-my-news-kv       → paste its ID below as MY_NEWS_KV
#   4. sportsrip-control-panel-kv → paste its ID below as CONTROL_PANEL_KV
# ============================================================

[[kv_namespaces]]
binding = "NEWS_KV"
id = "d7a9cfe5a184479282f37c6649cc8b0e"

[[kv_namespaces]]
binding = "CURATED_KV"
id = "f3b832f557f9460dba6cc3b02bd19974"

[[kv_namespaces]]
binding = "MY_NEWS_KV"
id = "79de7e8dc0d14a278ffccba2f87f9856"

[[kv_namespaces]]
binding = "CONTROL_PANEL_KV"
id = "48d64b2177f448efbb7e3212acd970be"
