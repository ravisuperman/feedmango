# ============================================================
# Wrangler Config — DEV Worker
# Created : 27-Mar-2026
# Purpose : Cloudflare Worker configuration for DEV instance.
#           Points to worker.js as entry point.
#           All 3 KV namespaces must be bound in Cloudflare
#           dashboard under Workers → Settings → Bindings.
# WARNING : Do not use PROD KV namespace IDs here.
#           Keep DEV and PROD KV stores separate always.
# ============================================================
name = "mango-sports-worker-dev"
main = "worker.js"
compatibility_date = "2024-03-25"

# ============================================================
# BLOCK START: KV Namespace Bindings
# Added  : 27-Mar-2026
# Purpose: Links worker code to Cloudflare KV stores.
#          Replace the id values with your actual DEV KV IDs
#          from Cloudflare Dashboard → KV → copy namespace ID.
# ============================================================
[[kv_namespaces]]
binding = "NEWS_KV"
id = "REPLACE_WITH_YOUR_DEV_NEWS_KV_ID"

[[kv_namespaces]]
binding = "CURATED_KV"
id = "REPLACE_WITH_YOUR_DEV_CURATED_KV_ID"

[[kv_namespaces]]
binding = "MY_NEWS_KV"
id = "REPLACE_WITH_YOUR_DEV_MY_NEWS_KV_ID"
# BLOCK END: KV Namespace Bindings (27-Mar-2026)
# ============================================================
