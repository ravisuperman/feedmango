<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="google-site-verification" content="Jht59lHwkn9XZKP7kyAcKtk9SMl9tPmllXm4ehBH-7c" />

  <title>SPORTStrip — Live Sport Feeds</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><circle cx=%2212%22 cy=%2212%22 r=%2210.5%22 fill=%22%23035bb0%22 stroke=%22%23fff%22 stroke-width=%223%22/><path d=%22M12 1.5v21M1.5 12h21%22 stroke=%22%23fff%22 stroke-width=%223%22/></svg>">  

  <!-- Modular Stylesheets -->
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/cards.css">
  <link rel="stylesheet" href="styles/widgets.css">
  <style>
    html[data-template="editorial"] body {
      background: #f4f6fb;
      color: #13233a;
    }
    html[data-template="editorial"] .layout-box {
      max-width: 1380px;
      margin: 0 auto;
      padding: 28px 24px 40px;
      background: transparent;
    }
    html[data-template="editorial"] .layout {
      display: block;
    }
    html[data-template="editorial"] .sidebar {
      display: none;
    }
    html[data-template="editorial"] .main-pane {
      width: 100%;
      max-width: none;
    }
    html[data-template="editorial"] .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #4e6786;
    }
    html[data-template="editorial"] .section-label::before {
      content: "";
      width: 6px;
      height: 34px;
      border-radius: 999px;
      background: linear-gradient(180deg, #0c4aa3 0%, #3c82ff 100%);
    }
    html[data-template="editorial"] #output {
      display: block;
    }
    .editorial-shell {
      display: grid;
      gap: 26px;
    }
    .editorial-topbar {
      display: grid;
      grid-template-columns: 170px 1fr 150px;
      align-items: center;
      gap: 18px;
      padding: 14px 18px;
      border: 1px solid #dbe5f0;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 10px 30px rgba(19, 35, 58, 0.06);
    }
    .editorial-brand,
    .editorial-weather {
      font-size: 14px;
      font-weight: 700;
      color: #3f5672;
    }
    .editorial-rail {
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, #0d3f87 0%, #2f67b8 55%, #123666 100%);
    }
    .editorial-hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) 320px;
      gap: 24px;
      align-items: start;
    }
    .editorial-hero {
      position: relative;
      min-height: 420px;
      border-radius: 28px;
      overflow: hidden;
      background: #10233d;
      box-shadow: 0 24px 50px rgba(16, 35, 61, 0.16);
    }
    .editorial-hero-link,
    .editorial-link {
      display: block;
      color: inherit;
      text-decoration: none;
    }
    .editorial-hero-media img,
    .editorial-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .editorial-hero-media {
      position: absolute;
      inset: 0;
    }
    .editorial-hero-overlay {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 420px;
      padding: 34px;
      background: linear-gradient(180deg, rgba(6, 18, 36, 0.05) 0%, rgba(6, 18, 36, 0.82) 100%);
      color: #fff;
    }
    .editorial-kicker {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .editorial-hero h1 {
      margin: 0 0 12px;
      max-width: 660px;
      font-size: clamp(34px, 4vw, 52px);
      line-height: 1.02;
    }
    .editorial-hero p {
      margin: 0;
      max-width: 620px;
      font-size: 16px;
      line-height: 1.6;
      color: rgba(255,255,255,0.88);
    }
    .editorial-side-rail,
    .editorial-insight-box,
    .editorial-block {
      border: 1px solid #dbe5f0;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 16px 35px rgba(19, 35, 58, 0.06);
    }
    .editorial-side-rail {
      padding: 22px;
    }
    .editorial-side-title {
      margin-bottom: 14px;
      font-size: 24px;
      font-weight: 800;
      color: #13233a;
    }
    .editorial-rank-item {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 14px;
      padding: 14px 0;
      border-top: 1px solid #e7edf4;
      cursor: pointer;
    }
    .editorial-rank-item:first-child {
      border-top: 0;
      padding-top: 0;
    }
    .editorial-rank-no {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
      color: #d2d8e1;
    }
    .editorial-rank-source {
      margin-bottom: 6px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .12em;
      color: #6882a0;
      text-transform: uppercase;
    }
    .editorial-rank-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.45;
      color: #13233a;
    }
    .editorial-block {
      padding: 22px;
    }
    .editorial-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }
    .editorial-section-head h2 {
      margin: 0;
      font-size: 26px;
      font-weight: 800;
      color: #13233a;
    }
    .editorial-section-head span {
      font-size: 13px;
      font-weight: 700;
      color: #2f67b8;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .editorial-card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }
    .editorial-tile {
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      overflow: hidden;
      background: #fff;
    }
    .editorial-tile .editorial-link {
      display: grid;
      height: 100%;
    }
    .editorial-thumb {
      aspect-ratio: 1.65 / 1;
      background: linear-gradient(135deg, #0d3f87 0%, #5d98ff 100%);
    }
    .editorial-thumb-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      font-size: 42px;
      color: rgba(255,255,255,0.92);
    }
    .editorial-copy {
      padding: 18px 20px 22px;
    }
    .editorial-copy h3 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.15;
      color: #13233a;
    }
    .editorial-story-tile .editorial-copy h3,
    .editorial-video-tile .editorial-copy h3,
    .editorial-analysis-tile .editorial-copy h3 {
      font-size: 24px;
    }
    .editorial-copy p {
      margin: 0;
      font-size: 15px;
      line-height: 1.65;
      color: #5f738c;
    }
    .editorial-lower-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) 320px;
      gap: 24px;
      align-items: start;
    }
    .editorial-insight-box {
      padding: 26px;
      background: linear-gradient(180deg, #11325c 0%, #0d2442 100%);
      color: #fff;
    }
    .editorial-insight-box h3 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.1;
    }
    .editorial-insight-box p {
      margin: 0 0 18px;
      line-height: 1.7;
      color: rgba(255,255,255,0.82);
    }
    .editorial-insight-box a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 999px;
      background: #fff;
      color: #123666;
      text-decoration: none;
      font-weight: 800;
    }
    .editorial-empty {
      padding: 64px 24px;
      border: 1px solid #dbe5f0;
      border-radius: 24px;
      background: #fff;
      text-align: center;
      font-size: 18px;
      color: #5f738c;
    }
    @media (max-width: 1100px) {
      .editorial-hero-grid,
      .editorial-lower-grid,
      .editorial-topbar {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 780px) {
      html[data-template="editorial"] .layout-box {
        padding: 18px 14px 30px;
      }
      .editorial-card-grid {
        grid-template-columns: 1fr;
      }
      .editorial-hero {
        min-height: 320px;
      }
      .editorial-hero-overlay {
        min-height: 320px;
        padding: 22px;
      }
      .editorial-hero h1 {
        font-size: 34px;
      }
    }

    /* Editorial refinement override */
    html[data-template="editorial"] body {
      background: #f7f8fb;
    }
    html[data-template="editorial"] #main-header {
      height: 96px;
      max-width: 1380px;
      margin: 0 auto;
      margin-top: 0;
      padding: 0 28px;
      gap: 22px;
      border-radius: 0;
      border-bottom: 1px solid #dbe4ee;
      background: #f7f8fb;
      color: #13233a;
      box-shadow: none;
      width: 100%;
    }
    html[data-template="editorial"] .brand {
      margin-right: 22px;
    }
    html[data-template="editorial"] .logo-text {
      display: none;
    }
    .editorial-logo {
      display: none;
      align-items: center;
      gap: 0;
      color: #10233d;
    }
    html[data-template="editorial"] .editorial-logo {
      display: inline-flex;
    }
    .editorial-logo-word {
      display: inline-flex;
      align-items: baseline;
      gap: 0;
      font-size: 28px;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .editorial-logo-sports {
      font-weight: 800;
      color: #0f223d;
    }
    .editorial-logo-rip {
      font-style: italic;
      font-weight: 400;
      color: #6d84a3;
    }
    html[data-template="editorial"] .nav-tabs {
      justify-content: flex-start;
      flex: 1;
      gap: 10px;
      overflow: visible;
    }
    html[data-template="editorial"] .tab {
      height: auto;
      padding: 8px 6px;
      border-bottom: 0;
      color: #334860;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0;
      background: transparent;
    }
    html[data-template="editorial"] .tab:hover {
      color: #10233d;
      background: transparent;
    }
    html[data-template="editorial"] .tab.active {
      color: #10233d;
      background: transparent;
      border-bottom: 0;
    }
    html[data-template="editorial"] #clockDisplay,
    html[data-template="editorial"] .dark-toggle {
      display: none;
    }
    .template-switch {
      position: relative;
      display: inline-flex;
      align-items: center;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
      margin-left: 4px;
    }
    .template-switch input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      margin: 0;
      z-index: 2;
    }
    .template-slider {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.28);
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .template-slider::after {
      content: '';
      display: block;
      width: 16px;
      height: 16px;
      margin: 2px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
      transition: transform 0.2s ease;
    }
    .template-switch input:checked + .template-slider {
      background: rgba(17,128,235,0.34);
      border-color: rgba(255,255,255,0.44);
    }
    .template-switch input:checked + .template-slider::after {
      transform: translateX(16px);
    }
    html[data-template="editorial"] .template-slider {
      background: #dfe6ee;
      border-color: #c7d3e1;
    }
    html[data-template="editorial"] .template-switch input:checked + .template-slider {
      background: #c7d6e8;
      border-color: #b3c4da;
    }
    html[data-template="editorial"] .layout-box {
      padding: 20px 28px 40px;
    }
    html[data-template="editorial"] .section-label {
      display: none;
    }
    .editorial-shell {
      gap: 34px;
    }
    .editorial-livebar {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      border-radius: 12px;
      background: #082b67;
      color: #d8e6ff;
    }
    .editorial-live-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 10px;
      border-radius: 4px;
      background: #1180eb;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .editorial-live-copy {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
    }
    .editorial-hero-grid {
      grid-template-columns: minmax(0, 1.75fr) 340px;
      gap: 28px;
    }
    .editorial-hero {
      min-height: 500px;
      border-radius: 28px;
      box-shadow: 0 16px 36px rgba(16, 35, 61, 0.12);
    }
    .editorial-hero-overlay {
      min-height: 500px;
      padding: 34px 36px;
    }
    .editorial-kicker {
      margin-bottom: 18px;
      padding: 7px 12px;
      border-radius: 4px;
      background: #1477d4;
    }
    .editorial-hero h1 {
      margin: 0 0 14px;
      font-size: clamp(40px, 4.6vw, 62px);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }
    .editorial-hero p {
      font-size: 17px;
      line-height: 1.65;
    }
    .editorial-block,
    .editorial-tile {
      border: 0;
    }
    .editorial-block {
      border-radius: 0;
      box-shadow: none;
    }
    .editorial-tile {
      border-radius: 24px;
      box-shadow: 0 12px 28px rgba(19, 35, 58, 0.08);
      background: #fff;
    }
    .editorial-side-rail,
    .editorial-block {
      padding: 0;
    }
    .editorial-side-rail {
      padding: 22px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 12px 30px rgba(19, 35, 58, 0.08);
    }
    .editorial-side-title {
      margin-bottom: 18px;
      font-size: 18px;
    }
    .editorial-rank-item {
      padding: 18px 0;
    }
    .editorial-rank-no {
      font-size: 48px;
    }
    .editorial-rank-title {
      font-size: 16px;
    }
    .editorial-section-head {
      padding-bottom: 14px;
      border-bottom: 1px solid #dbe4ee;
    }
    .editorial-section-head h2 {
      font-size: 20px;
    }
    .editorial-card-grid {
      gap: 28px;
    }
    .editorial-thumb {
      aspect-ratio: 1.55 / 1;
      border-radius: 24px;
      overflow: hidden;
    }
    .editorial-copy {
      padding: 16px 2px 2px;
    }
    .editorial-copy h3 {
      margin: 0 0 8px;
    }
    .editorial-copy p {
      font-size: 14px;
      line-height: 1.6;
    }
    .editorial-more-section {
      margin-top: 8px;
    }
    .editorial-empty {
      border-radius: 24px;
    }
    @media (max-width: 1100px) {
      html[data-template="editorial"] #main-header {
        height: auto;
        padding: 18px 18px 20px;
        flex-wrap: wrap;
      }
      .editorial-livebar,
      .editorial-hero-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 780px) {
      html[data-template="editorial"] .nav-tabs {
        order: 3;
        width: 100%;
        padding-top: 8px;
        overflow-x: auto;
      }
      .editorial-hero {
        min-height: 360px;
      }
      .editorial-hero-overlay {
        min-height: 360px;
      }
      .editorial-hero h1 {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     HEADER
     ═══════════════════════════════════════════════════════════ -->
<header id="main-header">
  <a href="/" class="brand">
    <div class="logo-text"><span>SPORTS</span><em>rip</em></div>
    <div class="editorial-logo">
      <span class="editorial-logo-word">
        <span class="editorial-logo-sports">SPORTS</span><span class="editorial-logo-rip">rip</span>
      </span>
    </div>
  </a>
  <nav class="nav-tabs" id="desktopTabs"></nav>
  <label class="template-switch" aria-label="Switch theme">
    <input id="templateToggle" type="checkbox" onchange="toggleTemplate()">
    <span class="template-slider"></span>
  </label>
  <div class="header-right" id="clockDisplay"></div>
  <button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
  <div class="hamburger" id="hamburger" onclick="toggleMenu()">
    <div class="line1"></div>
    <div class="line2"></div>
    <div class="line3"></div>
  </div>
</header>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu"></div>

<!-- ═══════════════════════════════════════════════════════════
     MAIN LAYOUT
     ═══════════════════════════════════════════════════════════ -->
<div class="layout-box">
<div class="layout">
  
  <!-- Main Content Area -->
  <div class="main-pane">
    <div class="section-label" id="sectionLabel">🏆 Top Stories</div>
    <div id="output"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    
    <!-- Sports Image -->
    <div class="sidebar-section">
      <img src="https://images.pexels.com/photos/8941571/pexels-photo-8941571.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Kids Sports" style="width:100%; height:auto; display:block;">
    </div>
    
    <!-- Trending Now -->
    <div class="sidebar-section">
      <div class="sidebar-title">Trending Now</div>
      <div class="trending-container">
        <div id="trendingList" class="trending-track"></div>
      </div>
    </div>
    
    <!-- Recent Updates (Sticky) -->
    <div class="sidebar-section sticky-widget">
      <div class="sidebar-title">Recent Updates</div>
      <div id="recentList"></div>
    </div>
    
  </div>
</div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     FOOTER
     ═══════════════════════════════════════════════════════════ -->
<footer>
  <div class="disclaimer">
    Disclaimer: Headlines are sourced from official RSS feeds of their respective publishers. 
    All rights and copyrights remain with the original content owners.
  </div>
</footer>

<!-- ═══════════════════════════════════════════════════════════
     MODALS
     ═══════════════════════════════════════════════════════════ -->

<!-- YouTube Video Modal -->
<div id="ytModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;align-items:center;justify-content:center;" onclick="closeYT(event)">
  <div style="position:relative;width:90%;max-width:900px;background:#000;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
    <button onclick="closeYTBtn()" style="position:absolute;top:10px;right:12px;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;z-index:10;">✕</button>
    <div style="position:relative;padding-bottom:56.25%;height:0;">
      <iframe id="ytFrame" src="" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;"></iframe>
    </div>
  </div>
</div>

<!-- Article Modal -->
<div id="artModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:9999;align-items:center;justify-content:center;" onclick="closeArtModal(event)">
  <div id="artModalBox" style="position:relative;width:calc(25vw + 10px);height:calc(75vh + 25px);background:#faf8f3;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.4);">
    <button onclick="closeArtModalBtn()" style="position:absolute;top:12px;right:14px;background:rgba(0,0,0,0.12);border:none;font-size:18px;width:34px;height:34px;border-radius:50%;cursor:pointer;z-index:10;color:#2c2418;font-weight:700;">✕</button>
    <div id="artModalContent" style="overflow-y:auto;flex:1;font-family:Georgia,serif;color:#2c2418;"></div>
  </div>
</div>

<!-- Responsive Modal Styles -->
<style>
@media(max-width:768px){
  #artModalBox { width:92vw !important; height:80vh !important; border-radius:8px !important; background:#fff !important; }
  #artModalContent { padding:20px 18px 30px !important; background:#fff !important; font-size:14px !important; color:#000 !important; }
}
@media(min-width:769px) and (max-width:1024px){
  #artModalBox { width:75vw !important; height:75vh !important; }
}
</style>

<!-- ═══════════════════════════════════════════════════════════
     FLOATING CONTROLS
     ═══════════════════════════════════════════════════════════ -->

<!-- Back to Top Button -->
