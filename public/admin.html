<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPORTSrip — Article Writer</title>
  <style>
    :root { --blue: #035bb0; --bg: #0f0f13; --surface: #1a1a22; --border: #2a2a38; --text: #f0f0f0; --dim: #888; --success: #00ff88; --danger: #ff4d4d; --gold: #f0a500; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 30px 20px; }
    .container { max-width: 760px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
    .subtitle { font-size: 13px; color: var(--dim); margin-bottom: 28px; }

    /* ── Password gate ── */
    .gate { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; text-align: center; max-width: 360px; margin: 80px auto; }
    .gate h2 { margin-bottom: 16px; font-size: 18px; }
    .gate input { width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; margin-bottom: 12px; outline: none; }
    .gate button { width: 100%; padding: 13px; background: var(--blue); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; }

    /* ── Form ── */
    .form-grid { display: grid; gap: 16px; }
    label { font-size: 12px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 6px; }
    input[type=text], textarea, select {
      width: 100%; padding: 12px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
      font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    input[type=text]:focus, textarea:focus, select:focus { border-color: var(--blue); }
    textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
    select option { background: var(--surface); }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Image preview */
    #imgPreview { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); display: none; margin-top: 8px; background: var(--surface); }

    /* Action buttons */
    .btn-row { display: flex; gap: 12px; margin-top: 8px; }
    .btn { padding: 13px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: opacity 0.2s; }
    .btn:disabled { opacity: 0.4; cursor: wait; }
    .btn-publish { background: var(--gold); color: #000; flex: 1; }
    .btn-clear { background: var(--surface); color: var(--dim); border: 1px solid var(--border); }

    /* Console log */
    #console { background: #000; color: #0f0; padding: 14px; border-radius: 8px; font-family: monospace; font-size: 12px; height: 120px; overflow-y: auto; margin-top: 20px; border: 1px solid var(--border); line-height: 1.6; }

    /* Published articles list */
    .articles-section { margin-top: 36px; }
    .articles-title { font-size: 14px; font-weight: 800; text-transform: uppercase; color: var(--dim); margin-bottom: 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .article-row { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; }
    .article-thumb { width: 72px; height: 54px; object-fit: cover; border-radius: 6px; background: var(--border); flex-shrink: 0; }
    .article-meta { flex: 1; min-width: 0; }
    .article-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .article-info { font-size: 11px; color: var(--dim); }
    .btn-delete { background: rgba(255,77,77,0.12); color: var(--danger); border: 1px solid rgba(255,77,77,0.3); border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; flex-shrink: 0; }
    .btn-delete:hover { background: rgba(255,77,77,0.25); }
  </style>
</head>
<body>

<!-- ============================================================
     BLOCK START: Password Gate
     Purpose: Simple client-side password to prevent public access.
     Change ADMIN_PASS below to your own password.
     For extra security, move this to a worker route with a header check.
============================================================ -->
<div id="gate" class="gate">
  <h2>🔐 SPORTSrip Admin</h2>
  <input type="password" id="passInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPass()"/>
  <button onclick="checkPass()">Enter</button>
</div>
<!-- BLOCK END: Password Gate -->

<div id="app" class="container" style="display:none">
  <h1>✍️ Article Writer</h1>
  <p class="subtitle">Articles you publish here appear at the TOP of the selected sport tab — above all RSS feeds.</p>

  <div class="form-grid">

    <div>
      <label>Article Title *</label>
      <input type="text" id="f-title" placeholder="e.g. Rohit Sharma smashes century as MI defeats CSK"/>
    </div>

    <div>
      <label>Summary / Description</label>
      <textarea id="f-desc" placeholder="2-3 sentence summary of the article..."></textarea>
    </div>

    <div class="row2">
      <div>
        <label>Sport Category *</label>
        <select id="f-sport">
          <option value="ipl">🏏 IPL 2026</option>
          <option value="cricket">🏏 Cricket</option>
          <option value="football">⚽ Football</option>
          <option value="f1">🏎️ Formula 1</option>
          <option value="basketball">🏀 Basketball</option>
          <option value="tennis">🎾 Tennis</option>
          <option value="boxing">🥊 Boxing</option>
          <option value="golf">⛳ Golf</option>
          <option value="badminton">🏸 Badminton</option>
          <option value="kabaddi">🤼 Kabaddi</option>
          <option value="rugby">🏉 Rugby</option>
          <option value="athletics">🏃 Athletics</option>
          <option value="olympics">🏅 Olympics</option>
          <option value="nfl">🏈 NFL</option>
          <option value="baseball">⚾ Baseball</option>
        </select>
      </div>
      <div>
        <label>Article Link (URL) *</label>
        <input type="text" id="f-link" placeholder="https://sportsrip.com/your-article"/>
      </div>
    </div>

    <div>
      <label>Thumbnail Image URL</label>
      <input type="text" id="f-image" placeholder="https://images.pexels.com/..." oninput="previewImg(this.value)"/>
      <img id="imgPreview" alt="Preview"/>
    </div>

    <div class="btn-row">
      <button class="btn btn-clear" onclick="clearForm()">Clear</button>
      <button class="btn btn-publish" id="btnPublish" onclick="publishArticle()">Publish Article</button>
    </div>
  </div>

  <div id="console">System ready. WORKER: <span id="workerLabel"></span></div>

  <div class="articles-section">
    <div class="articles-title">Published Articles <span id="articleCount" style="color:#f0a500"></span></div>
    <div id="articlesList"></div>
  </div>
</div>

<script>
  // ============================================================
  // BLOCK START: Configuration
  // Change ADMIN_PASS to your own password.
  // Change WORKER_URL to your PROD worker URL.
  // ============================================================
  var ADMIN_PASS = 'sportsrip2026';
  var WORKER_URL = 'https://mango-sports-worker.ravi-kompel.workers.dev';
  // ============================================================
  // BLOCK END: Configuration
  // ============================================================

  function checkPass() {
    if (document.getElementById('passInput').value === ADMIN_PASS) {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('workerLabel').textContent = WORKER_URL;
      loadPublished();
    } else {
      document.getElementById('passInput').style.border = '1px solid #ff4d4d';
      document.getElementById('passInput').value = '';
      document.getElementById('passInput').placeholder = 'Wrong password — try again';
    }
  }

  function log(msg) {
    var c = document.getElementById('console');
    c.innerHTML += '<br>> ' + msg;
    c.scrollTop = c.scrollHeight;
  }

  function previewImg(url) {
    var p = document.getElementById('imgPreview');
    if (url && url.startsWith('http')) { p.src = url; p.style.display = 'block'; }
    else { p.style.display = 'none'; }
  }

  function clearForm() {
    ['f-title','f-desc','f-link','f-image'].forEach(function(id){ document.getElementById(id).value = ''; });
    document.getElementById('imgPreview').style.display = 'none';
  }

  // ============================================================
  // BLOCK START: Publish Article
  // Purpose: Reads the form, builds an article object with isOwn:true,
  // fetches existing articles from the worker, prepends the new one,
  // then saves back via /api/publish-own (worker route we added).
  // ============================================================
  async function publishArticle() {
    var title = document.getElementById('f-title').value.trim();
    var desc  = document.getElementById('f-desc').value.trim();
    var sport = document.getElementById('f-sport').value;
    var link  = document.getElementById('f-link').value.trim();
    var image = document.getElementById('f-image').value.trim();

    if (!title) { log('<span style="color:#f00">❌ Title is required</span>'); return; }
    if (!link)  { log('<span style="color:#f00">❌ Article link is required</span>'); return; }

    var btn = document.getElementById('btnPublish');
    btn.disabled = true; btn.textContent = 'Publishing...';

    var article = {
      title:       title,
      description: desc,
      link:        link,
      image:       image || '',
      sport:       sport,
      source:      'SPORTSrip',
      isOwn:       true,
      pubDate:     new Date().toISOString()
    };

    log('Publishing "' + title.slice(0,40) + '..." to ' + sport + '...');

    try {
      var res = await fetch(WORKER_URL + '/api/publish-own', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-pass': ADMIN_PASS },
        body: JSON.stringify({ sport: sport, article: article })
      });

      if (res.ok) {
        var data = await res.json();
        log('<span style="color:#0f0">✅ Published! ' + data.total + ' own articles now in ' + sport + '</span>');
        clearForm();
        loadPublished();
      } else {
        log('<span style="color:#f00">❌ Server error: ' + res.status + '</span>');
      }
    } catch(e) {
      log('<span style="color:#f00">❌ Could not reach worker: ' + e.message + '</span>');
    }

    btn.disabled = false; btn.textContent = 'Publish Article';
  }
  // ============================================================
  // BLOCK END: Publish Article
  // ============================================================

  // ============================================================
  // BLOCK START: Load & Delete Published Articles
  // Purpose: Shows all your published articles with a delete button.
  // ============================================================
  async function loadPublished() {
    try {
      var res = await fetch(WORKER_URL + '/api/own-articles', {
        headers: { 'x-admin-pass': ADMIN_PASS }
      });
      if (!res.ok) return;
      var data = await res.json();
      var all = data.articles || [];
      document.getElementById('articleCount').textContent = '(' + all.length + ')';
      var list = document.getElementById('articlesList');
      list.innerHTML = '';
      if (!all.length) { list.innerHTML = '<div style="color:#888; font-size:13px; padding:20px 0;">No articles published yet.</div>'; return; }
      all.forEach(function(a, i) {
        var row = document.createElement('div');
        row.className = 'article-row';
        var thumb = a.image ? '<img class="article-thumb" src="'+a.image+'" onerror="this.style.display=\'none\'">' : '<div class="article-thumb"></div>';
        row.innerHTML = thumb + '<div class="article-meta"><div class="article-title">'+a.title+'</div><div class="article-info">'+a.sport.toUpperCase()+' · '+ new Date(a.pubDate).toLocaleString()+'</div></div><button class="btn-delete" onclick="deleteArticle(\''+a.sport+'\', \''+encodeURIComponent(a.link)+'\')">Delete</button>';
        list.appendChild(row);
      });
    } catch(e) { log('<span style="color:#f00">Could not load articles: '+e.message+'</span>'); }
  }

  async function deleteArticle(sport, encodedLink) {
    if (!confirm('Delete this article?')) return;
    try {
      var res = await fetch(WORKER_URL + '/api/delete-own', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-pass': ADMIN_PASS },
        body: JSON.stringify({ sport: sport, link: decodeURIComponent(encodedLink) })
      });
      if (res.ok) { log('✅ Article deleted.'); loadPublished(); }
      else log('<span style="color:#f00">❌ Delete failed: ' + res.status + '</span>');
    } catch(e) { log('<span style="color:#f00">❌ ' + e.message + '</span>'); }
  }
  // ============================================================
  // BLOCK END: Load & Delete Published Articles
  // ============================================================
</script>
</body>
</html>
