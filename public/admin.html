<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SPORTSrip Admin</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#f0f4f8;font-family:'Segoe UI',sans-serif;color:#1a202c;}
  .topbar{background:#035bb0;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;}
  .topbar-brand{font-size:18px;font-weight:800;color:#fff;letter-spacing:1px;}
  .topbar-brand em{color:#fbbf24;font-style:normal;}
  .topbar-env{display:flex;align-items:center;gap:10px;}
  .env-sel{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}
  .env-sel option{background:#035bb0;}
  .env-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;}
  .env-badge.dev{background:rgba(251,191,36,.25);color:#fbbf24;}
  .env-badge.prod{background:rgba(239,68,68,.25);color:#fc8181;}
  .prod-banner{background:#fef2f2;border-bottom:2px solid #fc8181;padding:8px 24px;font-size:12px;font-weight:700;color:#c53030;text-align:center;display:none;}
  .wrap{max-width:860px;margin:32px auto;padding:0 20px;}
  .card{background:#fff;border-radius:12px;padding:24px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:24px;}
  .card-title{font-size:15px;font-weight:700;margin-bottom:18px;color:#1a202c;}
  label{font-size:11px;font-weight:600;color:#4a5568;display:block;margin-bottom:4px;}
  label .req{color:#e53e3e;}
  label .opt{color:#718096;font-weight:400;}
  input,select,textarea{width:100%;background:#f7fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;color:#1a202c;font-family:inherit;transition:.15s;margin-bottom:14px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:#035bb0;box-shadow:0 0 0 3px rgba(3,91,176,.1);}
  textarea.small{min-height:60px;max-height:100px;resize:vertical;}
  textarea.large{min-height:200px;max-height:480px;resize:vertical;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;display:inline-flex;align-items:center;gap:6px;}
  .btn-blue{background:#035bb0;color:#fff;}
  .btn-blue:hover{background:#0269cc;}
  .btn-blue:disabled{opacity:.5;cursor:not-allowed;}
  .btn-red{background:#e53e3e;color:#fff;}
  .btn-red:hover{background:#c53030;}
  .btn-outline{background:transparent;border:1px solid #e2e8f0;color:#4a5568;}
  .btn-outline:hover{border-color:#035bb0;color:#035bb0;}
  .btn-sm{padding:5px 10px;font-size:11px;}
  .btn-row{display:flex;gap:8px;align-items:center;margin-top:4px;}
  .console{background:#0f172a;border-radius:8px;padding:10px 14px;font-family:'Courier New',monospace;font-size:11px;color:#94a3b8;min-height:50px;max-height:120px;overflow-y:auto;margin-top:12px;}
  .ok{color:#4ade80;}.err{color:#f87171;}.inf{color:#60a5fa;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;background:#f7fafc;border:1px solid #e2e8f0;border-radius:8px;min-height:40px;cursor:pointer;align-items:center;margin-bottom:14px;}
  .chip{background:#035bb0;color:#fff;padding:2px 10px;border-radius:14px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;}
  .chip .x{cursor:pointer;opacity:.7;font-size:13px;}
  .chip .x:hover{opacity:1;}
  .chip-hint{font-size:12px;color:#718096;}
  .chip-opts{position:relative;}
  .chip-dd{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:100;display:none;padding:4px 0;}
  .chip-dd.open{display:block;}
  .chip-opt{padding:7px 12px;cursor:pointer;font-size:12px;}
  .chip-opt:hover{background:#f0f4f8;}
  .chip-opt.sel{color:#035bb0;font-weight:600;}
  .img-prev{width:100%;height:100px;object-fit:cover;border-radius:8px;border:1px solid #e2e8f0;display:none;margin-bottom:14px;}
  .av-prev{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #e2e8f0;display:none;vertical-align:middle;margin-left:8px;}
  /* Published list */
  .art-item{display:flex;align-items:center;gap:12px;padding:10px;background:#f7fafc;border-radius:8px;margin-bottom:8px;border:1px solid #e2e8f0;}
  .art-thumb{width:56px;height:40px;object-fit:cover;border-radius:6px;flex-shrink:0;border:1px solid #e2e8f0;}
  .art-ph{width:56px;height:40px;border-radius:6px;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .art-info{flex:1;min-width:0;}
  .art-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .art-meta{font-size:11px;color:#718096;margin-top:2px;}
  .badge{display:inline-block;padding:1px 6px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;background:#dbeafe;color:#1e40af;}
  /* ac */
  .ac-wrap{position:relative;}
  .ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:100;max-height:150px;overflow-y:auto;display:none;}
  .ac-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:12px;}
  .ac-item:hover{background:#f0f4f8;}
  .ac-av{width:26px;height:26px;border-radius:50%;object-fit:cover;border:1px solid #e2e8f0;}
  .ac-av-ph{width:26px;height:26px;border-radius:50%;background:#035bb0;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
  @media(max-width:600px){.row2{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand"><span>SPORTS</span><em>rip</em> Admin</div>
  <div class="topbar-env">
    <select class="env-sel" id="envSel" onchange="switchEnv(this.value)">
      <option value="dev">🟠 DEV</option>
      <option value="prod">🔴 PROD</option>
    </select>
    <span class="env-badge dev" id="envBadge">● DEV</span>
  </div>
</div>
<div class="prod-banner" id="prodBanner">⚠️ PROD MODE — Changes affect live sportsrip.com</div>

<div class="wrap">

  <!-- WRITE ARTICLE -->
  <div class="card">
    <div class="card-title">✍️ Write Article</div>

    <label>Headline <span class="req">*</span></label>
    <textarea id="aTitle" class="small" placeholder="Article headline..."></textarea>

    <label>Content <span class="req">*</span></label>
    <textarea id="aDesc" class="large" placeholder="Full article content..."></textarea>

    <div class="row2">
      <div>
        <label>Primary Sport <span class="req">*</span></label>
        <select id="aSport">
          <option value="ipl">🏏 IPL 2026</option>
          <option value="cricket">🏏 Cricket</option>
          <option value="football">⚽ Football</option>
          <option value="f1">🏎️ Formula 1</option>
          <option value="basketball">🏀 Basketball</option>
          <option value="tennis">🎾 Tennis</option>
          <option value="kabaddi">🤼 Kabaddi</option>
          <option value="boxing">🥊 Boxing</option>
          <option value="golf">⛳ Golf</option>
          <option value="badminton">🏸 Badminton</option>
          <option value="nfl">🏈 NFL</option>
          <option value="baseball">⚾ Baseball</option>
        </select>
      </div>
      <div>
        <label>Article Link</label>
        <input type="url" id="aLink" value="https://www.sportsrip.com"/>
      </div>
    </div>

    <label>Also appear on tabs <span class="opt">(IPL + Cricket pre-selected)</span></label>
    <div class="chip-opts">
      <div class="chips" id="chipsDisplay" onclick="toggleDD()">
        <div class="chip" data-v="ipl">🏏 IPL 2026 <span class="x" onclick="rmChip(event,'ipl')">×</span></div>
        <div class="chip" data-v="cricket">🏏 Cricket <span class="x" onclick="rmChip(event,'cricket')">×</span></div>
        <span class="chip-hint">+ add more</span>
      </div>
      <div class="chip-dd" id="chipDD">
        <div class="chip-opt sel" data-v="ipl" onclick="togChip('ipl','🏏 IPL 2026',event)">🏏 IPL 2026</div>
        <div class="chip-opt sel" data-v="cricket" onclick="togChip('cricket','🏏 Cricket',event)">🏏 Cricket</div>
        <div class="chip-opt" data-v="football" onclick="togChip('football','⚽ Football',event)">⚽ Football</div>
        <div class="chip-opt" data-v="f1" onclick="togChip('f1','🏎️ F1',event)">🏎️ Formula 1</div>
        <div class="chip-opt" data-v="basketball" onclick="togChip('basketball','🏀 Basketball',event)">🏀 Basketball</div>
        <div class="chip-opt" data-v="tennis" onclick="togChip('tennis','🎾 Tennis',event)">🎾 Tennis</div>
        <div class="chip-opt" data-v="kabaddi" onclick="togChip('kabaddi','🤼 Kabaddi',event)">🤼 Kabaddi</div>
        <div class="chip-opt" data-v="boxing" onclick="togChip('boxing','🥊 Boxing',event)">🥊 Boxing</div>
        <div class="chip-opt" data-v="golf" onclick="togChip('golf','⛳ Golf',event)">⛳ Golf</div>
        <div class="chip-opt" data-v="nfl" onclick="togChip('nfl','🏈 NFL',event)">🏈 NFL</div>
      </div>
    </div>

    <div class="row2">
      <div>
        <label>Thumbnail URL <span class="opt">(optional)</span></label>
        <input type="url" id="aImage" placeholder="https://images.pexels.com/..." oninput="prevImg()"/>
        <img class="img-prev" id="imgPrev"/>
      </div>
      <div>
        <label>Author Name <span class="opt">(type to search)</span></label>
        <div class="ac-wrap">
          <input type="text" id="aAuthor" placeholder="e.g. Ravi Kompella" oninput="acSearch()" onfocus="acSearch()" autocomplete="off"/>
          <div class="ac-list" id="acList"></div>
        </div>
        <label>Author Photo URL</label>
        <input type="url" id="aPhoto" placeholder="https://..." oninput="prevAv()"/>
        <img class="av-prev" id="avPrev"/>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-outline" onclick="importTxt()">📄 Import .txt</button>
      <input type="file" id="txtFile" accept=".txt" style="display:none" onchange="loadTxt(this)"/>
      <button class="btn btn-outline" onclick="clearForm()">🗑 Clear</button>
      <button class="btn btn-blue" id="btnPub" onclick="publish()">🚀 Publish Article</button>
    </div>
    <div class="console" id="con">Ready.</div>
  </div>

  <!-- PUBLISHED -->
  <div class="card">
    <div class="card-title" style="display:flex;align-items:center;">
      📰 Published Articles
      <button class="btn btn-outline btn-sm" onclick="loadPub()" style="margin-left:auto;">↻ Refresh</button>
    </div>
    <div id="pubList" style="color:#718096;font-size:13px;">Click Refresh to load.</div>
  </div>

</div>

<script>
var WORKERS={
  dev:'https://mango-sports-worker-dev.ravi-kompel.workers.dev',
  prod:'https://mango-sports-worker.ravi-kompel.workers.dev'
};
var PASS='sportsrip2026';
var ENV='dev';
var W=WORKERS.dev;
var AUTHORS=[{name:'Ravi Kompella',photo:'https://i.ibb.co/PvtxHfgF/download.png'}];
var selTabs=['ipl','cricket'];
var ddOpen=false;

// ENV
function switchEnv(env){
  ENV=env; W=WORKERS[env];
  document.getElementById('envBadge').textContent='● '+env.toUpperCase();
  document.getElementById('envBadge').className='env-badge '+env;
  document.getElementById('prodBanner').style.display=env==='prod'?'block':'none';
  log('Switched to '+env.toUpperCase()+': '+W);
  loadPub();
}

// CHIPS
function toggleDD(){ddOpen=!ddOpen;document.getElementById('chipDD').classList.toggle('open',ddOpen);}
document.addEventListener('click',function(e){if(!e.target.closest('.chip-opts')){ddOpen=false;var d=document.getElementById('chipDD');if(d)d.classList.remove('open');}});
function togChip(val,label,e){
  e.stopPropagation();
  var idx=selTabs.indexOf(val);
  if(idx>-1){selTabs.splice(idx,1);removeChipDOM(val);var o=document.querySelector('.chip-opt[data-v="'+val+'"]');if(o)o.classList.remove('sel');}
  else{selTabs.push(val);addChipDOM(val,label);var o=document.querySelector('.chip-opt[data-v="'+val+'"]');if(o)o.classList.add('sel');}
}
function addChipDOM(val,label){
  var d=document.getElementById('chipsDisplay'),hint=d.querySelector('.chip-hint');
  var c=document.createElement('div');c.className='chip';c.dataset.v=val;
  c.innerHTML=label+' <span class="x" onclick="rmChip(event,\''+val+'\')">×</span>';
  if(hint)d.insertBefore(c,hint);else d.appendChild(c);
}
function removeChipDOM(val){var c=document.querySelector('.chips .chip[data-v="'+val+'"]');if(c)c.remove();}
function rmChip(e,val){
  e.stopPropagation();
  var idx=selTabs.indexOf(val);if(idx>-1)selTabs.splice(idx,1);
  removeChipDOM(val);
  var o=document.querySelector('.chip-opt[data-v="'+val+'"]');if(o)o.classList.remove('sel');
}

// AUTOCOMPLETE
function acSearch(){
  var val=document.getElementById('aAuthor').value.toLowerCase().trim();
  var list=document.getElementById('acList');
  var matches=AUTHORS.filter(a=>a.name.toLowerCase().includes(val));
  if(!val||!matches.length){list.style.display='none';return;}
  list.innerHTML='';
  matches.forEach(function(au){
    var item=document.createElement('div');item.className='ac-item';
    var init=au.name.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);
    var av=au.photo?'<img class="ac-av" src="'+au.photo+'">'
      :'<div class="ac-av-ph">'+init+'</div>';
    item.innerHTML=av+'<span>'+au.name+'</span>';
    item.onclick=function(){
      document.getElementById('aAuthor').value=au.name;
      document.getElementById('aPhoto').value=au.photo||'';
      prevAv(); list.style.display='none';
    };
    list.appendChild(item);
  });
  list.style.display='block';
}
document.addEventListener('click',function(e){if(!e.target.closest('.ac-wrap')){var l=document.getElementById('acList');if(l)l.style.display='none';}});

// PREVIEWS
function prevImg(){var u=document.getElementById('aImage').value.trim(),i=document.getElementById('imgPrev');if(u){i.src=u;i.style.display='block';i.onerror=function(){i.style.display='none';};}else i.style.display='none';}
function prevAv(){var u=document.getElementById('aPhoto').value.trim(),i=document.getElementById('avPrev');if(u){i.src=u;i.style.display='inline-block';i.onerror=function(){i.style.display='none';};}else i.style.display='none';}
function importTxt(){document.getElementById('txtFile').click();}
function loadTxt(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){document.getElementById('aDesc').value=e.target.result;};r.readAsText(f);input.value='';}

// LOG
function log(msg,type){
  var el=document.getElementById('con');
  var cls=type==='ok'?'ok':type==='err'?'err':'inf';
  el.innerHTML+=(el.innerHTML?'\n':'')+'> <span class="'+cls+'">'+msg+'</span>';
  el.scrollTop=el.scrollHeight;
}

// CLEAR
function clearForm(){
  ['aTitle','aDesc','aImage','aAuthor','aPhoto'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('aLink').value='https://www.sportsrip.com';
  document.getElementById('imgPrev').style.display='none';
  document.getElementById('avPrev').style.display='none';
  document.getElementById('con').innerHTML='Cleared.';
}

// PUBLISH
async function publish(){
  var title=document.getElementById('aTitle').value.trim();
  var desc=document.getElementById('aDesc').value.trim();
  var link=document.getElementById('aLink').value.trim()||'https://www.sportsrip.com';
  var image=document.getElementById('aImage').value.trim();
  var sport=document.getElementById('aSport').value;
  var author=document.getElementById('aAuthor').value.trim();
  var photo=document.getElementById('aPhoto').value.trim();
  if(!title){log('Headline is required','err');return;}
  if(!desc){log('Content is required','err');return;}
  var sports=[sport];
  selTabs.forEach(function(s){if(!sports.includes(s))sports.push(s);});
  var btn=document.getElementById('btnPub');
  btn.disabled=true;btn.textContent='⏳ Publishing...';
  log('Publishing to '+ENV.toUpperCase()+': '+sports.join(', '));
  try{
    var res=await fetch(W+'/api/publish-own',{method:'POST',
      headers:{'Content-Type':'application/json','x-admin-pass':PASS},
      body:JSON.stringify({sport:sport,sports:sports,
        article:{title:title,description:desc,link:link,image:image||'',
          sport:sport,source:'SPORTSrip',isOwn:true,
          pubDate:new Date().toISOString(),authorName:author,authorPhoto:photo}})});
    var d=await res.json();
    if(res.ok&&d.success){
      log('Published to: '+d.savedTo.join(', '),'ok');
      if(author&&!AUTHORS.find(function(a){return a.name===author;}))
        AUTHORS.push({name:author,photo:photo||''});
      clearForm();
      loadPub();
    } else {
      log((d.error||'Error '+res.status),'err');
    }
  }catch(e){log(e.message,'err');}
  btn.disabled=false;btn.textContent='🚀 Publish Article';
}

// LOAD PUBLISHED
async function loadPub(){
  var c=document.getElementById('pubList');
  c.innerHTML='<div style="color:#718096;font-size:13px;">Loading...</div>';
  try{
    var r=await fetch(W+'/api/own-articles',{headers:{'x-admin-pass':PASS}});
    var d=await r.json();
    var arts=d.articles||[];
    var seen=new Set(),unique=[];
    arts.forEach(function(a){if(!seen.has(a.title)){seen.add(a.title);unique.push(a);}});
    unique.sort(function(a,b){return new Date(b.pubDate)-new Date(a.pubDate);});
    if(!unique.length){c.innerHTML='<div style="color:#718096;font-size:13px;">No articles yet.</div>';return;}
    c.innerHTML='<div style="font-size:11px;color:#718096;margin-bottom:10px;">'+unique.length+' articles in '+ENV.toUpperCase()+'</div>';
    unique.forEach(function(a){
      var div=document.createElement('div');div.className='art-item';
      if(a.image){var th=document.createElement('img');th.className='art-thumb';th.src=a.image;th.onerror=function(){this.style.display='none';};div.appendChild(th);}
      else{var th=document.createElement('div');th.className='art-ph';th.textContent='🏏';div.appendChild(th);}
      var info=document.createElement('div');info.className='art-info';
      var dt=new Date(a.pubDate).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      info.innerHTML='<div class="art-title">'+a.title+'</div>'+
        '<div class="art-meta"><span class="badge">'+(a.sport||'ipl').toUpperCase()+'</span> · '+(a.authorName||'—')+' · '+dt+'</div>';
      div.appendChild(info);
      var db=document.createElement('button');db.className='btn btn-red btn-sm';db.textContent='🗑 Delete';
      (function(art,btn){
        btn.onclick=function(){
          if(!confirm('Delete "'+art.title.slice(0,50)+'"?'))return;
          btn.textContent='...';btn.disabled=true;
          fetch(W+'/api/delete-own',{method:'POST',
            headers:{'Content-Type':'application/json','x-admin-pass':PASS},
            body:JSON.stringify({sport:art.sport,link:art.link})})
          .then(function(r){return r.json();})
          .then(function(d){
            if(d.success)btn.closest('.art-item').remove();
            else{btn.textContent='🗑 Delete';btn.disabled=false;}
          })
          .catch(function(){btn.textContent='🗑 Delete';btn.disabled=false;});
        };
      })(a,db);
      div.appendChild(db);
      c.appendChild(div);
    });
  }catch(e){c.innerHTML='<div style="color:#e53e3e;font-size:13px;">'+e.message+'</div>';}
}

// INIT
loadPub();
</script>
</body>
</html>
