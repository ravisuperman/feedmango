<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PEP Sports — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #15181f; --surface2: #1c2030; --border: #2a2f3d;
      --accent: #6c63ff; --accent-glow: rgba(108,99,255,0.25);
      --green: #22c55e; --green-dim: rgba(34,197,94,0.15);
      --red: #ef4444; --text: #e2e8f0; --text-muted: #64748b;
      --radius: 12px; --transition: 0.2s ease;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .shell { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }
    header {
      background: linear-gradient(135deg, #1a1040 0%, #0d0f14 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem; display: flex; align-items: center; gap: 1rem;
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), #a78bfa); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .logo-text { font-size: 1.2rem; font-weight: 800; }
    .logo-text span { color: var(--accent); }
    .badge { margin-left: auto; background: var(--accent-glow); color: #a78bfa; border: 1px solid rgba(108,99,255,0.4); border-radius: 6px; padding: 0.2rem 0.7rem; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    main { max-width: 900px; width: 100%; margin: 0 auto; padding: 2rem 1.5rem 4rem; display: flex; flex-direction: column; gap: 1.75rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem; }
    .card-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.5rem; }
    .card-header .icon { width: 32px; height: 32px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .card-title { font-size: 1.05rem; font-weight: 700; }
    .card-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-left: auto; }
    .form-row { display: grid; grid-template-columns: 160px 1fr; gap: 1rem; align-items: start; margin-bottom: 1rem; }
    label { font-size: 0.82rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; padding-top: 0.6rem; }
    select, textarea, input[type="text"] { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; padding: 0.6rem 0.85rem; outline: none; transition: border-color var(--transition), box-shadow var(--transition); resize: vertical; }
    select:focus, textarea:focus, input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    select { cursor: pointer; }
    textarea { min-height: 110px; font-size: 0.85rem; line-height: 1.7; }
    .btn { display: inline-flex; align-items: center; gap: 0.45rem; padding: 0.55rem 1.15rem; border-radius: 8px; border: none; font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }
    .btn:not(:disabled):hover { transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #818cf8); color: #fff; box-shadow: 0 4px 14px rgba(108,99,255,0.35); }
    .btn-primary:not(:disabled):hover { box-shadow: 0 6px 20px rgba(108,99,255,0.5); }
    .btn-success { background: linear-gradient(135deg, #16a34a, #22c55e); color: #fff; box-shadow: 0 4px 14px rgba(34,197,94,0.3); }
    .btn-success:not(:disabled):hover { box-shadow: 0 6px 20px rgba(34,197,94,0.45); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:not(:disabled):hover { background: #23293a; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1.25rem; }
    #feed-list { margin-top: 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .feed-item { display: flex; align-items: center; gap: 0.75rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.65rem 1rem; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .feed-check { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .feed-details { flex: 1; min-width: 0; }
    .feed-name { font-size: 0.875rem; font-weight: 600; }
    .feed-url { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mode-display { display: flex; align-items: center; gap: 1rem; margin: 1rem 0 1.5rem; }
    .mode-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .mode-dot.auto   { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .mode-dot.custom { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .mode-label { font-size: 1rem; font-weight: 700; }
    #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; display: flex; flex-direction: column; gap: 0.6rem; z-index: 9999; }
    .toast { display: flex; align-items: center; gap: 0.6rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1.1rem; font-size: 0.875rem; font-weight: 500; box-shadow: 0 8px 32px rgba(0,0,0,0.5); animation: slideIn 0.3s ease; max-width: 340px; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error   { border-left: 3px solid var(--red); }
    .toast.info    { border-left: 3px solid var(--accent); }
    .progress-wrap { margin-top: 1rem; display: none; }
    .progress-wrap.show { display: block; }
    .progress-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem; }
    .progress-bar-bg { background: var(--surface2); border-radius: 100px; height: 6px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--accent), #a78bfa); transition: width 0.4s ease; width: 0%; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.25); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .section-divider { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); display: flex; align-items: center; gap: 0.75rem; }
    .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">PEP <span>Sports</span></div>
    </div>
    <span class="badge">Admin Panel</span>
  </header>

  <main>
    <div class="section-divider">RSS Feed Discoverer</div>

    <div class="card">
      <div class="card-header">
        <div class="icon">🔍</div>
        <div class="card-title">Discover RSS Feeds</div>
        <div class="card-subtitle">Finds feeds from the URLs you paste</div>
      </div>

      <div class="form-row">
        <label for="sport-select">Sport / Category</label>
        <select id="sport-select">
          <option value="cricket">🏏 Cricket</option>
          <option value="football">⚽ Football</option>
          <option value="basketball">🏀 Basketball</option>
          <option value="tennis">🎾 Tennis</option>
          <option value="baseball">⚾ Baseball</option>
          <option value="general">📰 General</option>
        </select>
      </div>

      <div class="form-row">
        <label for="url-input">Website URLs</label>
        <div>
          <textarea id="url-input" placeholder="Paste one URL per line, e.g.&#10;https://www.bbc.co.uk/sport/cricket&#10;https://www.skysports.com/cricket"></textarea>
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.35rem;">One URL per line. The tool finds embedded RSS/Atom feeds automatically.</div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="btn-discover">🔍 Discover RSS Feeds</button>
      </div>

      <div id="feed-list" style="display:none;"></div>

      <div id="feed-actions" style="display:none;">
        <div class="btn-row" style="margin-top:1.25rem; padding-top:1.25rem; border-top:1px solid var(--border);">
          <button class="btn btn-success" id="btn-process">💾 Process &amp; Save to My News</button>
          <button class="btn btn-ghost" id="btn-export-csv">📤 Export CSV</button>
          <button class="btn btn-ghost" id="btn-export-xml">📤 Export XML</button>
        </div>
        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-label" id="progress-label">Processing articles &amp; fetching images…</div>
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
        </div>
      </div>
    </div>

    <div class="section-divider">Content Mode</div>

    <div class="card" id="mode-card">
      <div class="card-header">
        <div class="icon">🎬</div>
        <div class="card-title">Site Content Mode</div>
      </div>
      <div class="mode-display">
        <div class="mode-dot" id="mode-dot"></div>
        <div>
          <div class="mode-label" id="mode-label">Loading…</div>
          <div style="font-size:0.8rem;color:var(--text-muted);" id="mode-desc"></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-success" id="btn-run-ours" disabled>▶ Run Our News</button>
        <button class="btn btn-ghost" id="btn-auto" disabled>↩ Back to Auto</button>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>

<script>
  const API = '';
  let discoveredFeeds = [];

  function toast(msg, type = 'info') {
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 4500);
  }

  function setLoading(btn, loading, label) {
    if (loading) { btn._orig = btn.innerHTML; btn.disabled = true; btn.innerHTML = `<div class="spinner"></div>${label || 'Working…'}`; }
    else { btn.disabled = false; btn.innerHTML = btn._orig; }
  }

  function parseUrls(raw) {
    return raw.split('\n').map(u => u.trim()).filter(u => u.startsWith('http://') || u.startsWith('https://'));
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── DISCOVER ──
  document.getElementById('btn-discover').addEventListener('click', async () => {
    const btn = document.getElementById('btn-discover');
    const sport = document.getElementById('sport-select').value;
    const urls = parseUrls(document.getElementById('url-input').value);
    if (!urls.length) { toast('Please paste at least one valid URL.', 'error'); return; }
    setLoading(btn, true, 'Discovering…');
    try {
      const res = await fetch(`${API}/api/discover-rss`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ urls, sport }) });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();
      discoveredFeeds = (data.feeds || []).map(f => ({ ...f, selected: true }));
      renderFeedList();
      if (!discoveredFeeds.length) toast('No RSS feeds found. Try linking directly to a sport section.', 'error');
      else toast(`Found ${discoveredFeeds.length} feed(s)!`, 'success');
    } catch (e) { toast(`Discovery failed: ${e.message}`, 'error'); }
    finally { setLoading(btn, false); }
  });

  function renderFeedList() {
    const container = document.getElementById('feed-list');
    const actions = document.getElementById('feed-actions');
    if (!discoveredFeeds.length) { container.style.display = 'none'; actions.style.display = 'none'; return; }
    container.style.display = 'flex'; actions.style.display = 'block'; container.innerHTML = '';
    discoveredFeeds.forEach((feed, i) => {
      const item = document.createElement('div');
      item.className = 'feed-item';
      item.innerHTML = `<input type="checkbox" class="feed-check" id="feed-${i}" ${feed.selected ? 'checked' : ''} /><div class="feed-details"><div class="feed-name">${esc(feed.title || feed.source || 'Unknown Feed')}</div><div class="feed-url">${esc(feed.url)}</div></div>`;
      item.querySelector('input').addEventListener('change', e => { discoveredFeeds[i].selected = e.target.checked; });
      container.appendChild(item);
    });
  }

  // ── PROCESS & SAVE ──
  document.getElementById('btn-process').addEventListener('click', async () => {
    const selected = discoveredFeeds.filter(f => f.selected);
    if (!selected.length) { toast('Select at least one feed.', 'error'); return; }
    const btn = document.getElementById('btn-process');
    const sport = document.getElementById('sport-select').value;
    const wrap = document.getElementById('progress-wrap');
    const bar = document.getElementById('progress-bar');
    const lbl = document.getElementById('progress-label');
    setLoading(btn, true, 'Processing…');
    wrap.classList.add('show'); bar.style.width = '10%'; lbl.textContent = 'Fetching articles…';
    let fakeProgress = 10;
    const ticker = setInterval(() => { fakeProgress = Math.min(fakeProgress + 4, 85); bar.style.width = fakeProgress + '%'; }, 800);
    try {
      const res = await fetch(`${API}/api/process-and-save`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sport, feeds: selected.map(f => ({ url: f.url, name: f.title || f.source })) }) });
      clearInterval(ticker);
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const data = await res.json();
      bar.style.width = '100%'; lbl.textContent = `✅ Saved ${data.count || '?'} articles to My News (${sport})`;
      toast(`Saved ${data.count || '?'} articles!`, 'success');
    } catch (e) { clearInterval(ticker); bar.style.width = '0%'; lbl.textContent = 'Error — see toast.'; toast(`Failed: ${e.message}`, 'error'); }
    finally { setLoading(btn, false); setTimeout(() => { wrap.classList.remove('show'); bar.style.width = '0%'; }, 5000); }
  });

  // ── EXPORTS ──
  function download(filename, mime, content) { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([content], { type: mime })); a.download = filename; a.click(); URL.revokeObjectURL(a.href); }
  function esc2(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  document.getElementById('btn-export-csv').addEventListener('click', () => {
    const sel = discoveredFeeds.filter(f => f.selected); if (!sel.length) { toast('Select a feed first.', 'error'); return; }
    const sport = document.getElementById('sport-select').value;
    let csv = 'Title,URL,Source,Sport\n';
    sel.forEach(f => { csv += `"${esc2(f.title)}","${esc2(f.url)}","${esc2(f.source)}","${sport}"\n`; });
    download(`pep-feeds-${sport}.csv`, 'text/csv', csv); toast('CSV exported.', 'success');
  });

  document.getElementById('btn-export-xml').addEventListener('click', () => {
    const sel = discoveredFeeds.filter(f => f.selected); if (!sel.length) { toast('Select a feed first.', 'error'); return; }
    const sport = document.getElementById('sport-select').value;
    let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<feeds sport="${sport}">\n`;
    sel.forEach(f => { xml += `  <feed>\n    <title>${esc2(f.title)}</title>\n    <url>${esc2(f.url)}</url>\n    <source>${esc2(f.source)}</source>\n  </feed>\n`; });
    xml += '</feeds>'; download(`pep-feeds-${sport}.xml`, 'application/xml', xml); toast('XML exported.', 'success');
  });

  // ── MODE TOGGLE ──
  async function loadMode() {
    try { const res = await fetch(`${API}/api/mode`); const data = await res.json(); applyMode(data.mode || 'auto'); }
    catch { applyMode('auto'); }
  }

  function applyMode(mode) {
    const dot = document.getElementById('mode-dot');
    const label = document.getElementById('mode-label');
    const desc = document.getElementById('mode-desc');
    const btnRun = document.getElementById('btn-run-ours');
    const btnAuto = document.getElementById('btn-auto');
    if (mode === 'custom') {
      dot.className = 'mode-dot custom'; label.textContent = '▶ RUNNING OUR NEWS';
      desc.textContent = 'Site is showing your hand-picked curated content.';
      btnRun.disabled = true; btnAuto.disabled = false;
    } else {
      dot.className = 'mode-dot auto'; label.textContent = '● AUTO NEWS';
      desc.textContent = 'Site is showing automatically fetched news.';
      btnRun.disabled = false; btnAuto.disabled = true;
    }
  }

  async function setMode(mode) {
    const btn = mode === 'custom' ? document.getElementById('btn-run-ours') : document.getElementById('btn-auto');
    setLoading(btn, true, mode === 'custom' ? 'Activating…' : 'Switching…');
    try {
      const res = await fetch(`${API}/api/set-mode`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mode }) });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      applyMode(mode);
      toast(mode === 'custom' ? '🎬 Now running your curated news!' : '↩ Switched back to Auto.', 'success');
    } catch (e) { toast(`Failed: ${e.message}`, 'error'); }
    finally { setLoading(btn, false); }
  }

  document.getElementById('btn-run-ours').addEventListener('click', () => setMode('custom'));
  document.getElementById('btn-auto').addEventListener('click', () => setMode('auto'));

  loadMode();
</script>
</body>
</html>
