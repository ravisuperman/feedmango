<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>RSS Core | Feedly Edition</title>
    <style>
        :root { --bg: #0d0d10; --card: #16161a; --accent: #00d2ff; --text: #f0f0f0; --dim: #888; --glass: rgba(255,255,255,0.03); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui; display: flex; height: 100vh; margin: 0; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: #000; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; padding: 24px 0; }
        .logo { padding: 0 24px; font-size: 20px; font-weight: 900; letter-spacing: -1px; margin-bottom: 40px; }
        .logo span { color: var(--accent); }
        .nav-item { padding: 12px 24px; color: var(--dim); cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .nav-item:hover { color: #fff; background: var(--glass); }
        .nav-item.active { color: var(--accent); background: rgba(0, 210, 255, 0.05); border-left: 3px solid var(--accent); }

        /* MAIN FEED */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 70px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; padding: 0 40px; justify-content: space-between; }
        .feed-container { flex: 1; overflow-y: auto; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }

        /* CARDS */
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.1); }
        .img-box { width: 100%; height: 180px; background: #222; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .body { padding: 20px; }
        .source { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; letter-spacing: 1px; }
        .title { font-size: 17px; font-weight: 700; line-height: 1.4; color: #fff; }
        
        #loader { text-align: center; padding: 100px; color: var(--dim); font-size: 14px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">RSS<span>CORE</span></div>
    <div class="nav-item active" onclick="load('all')">All Stories</div>
    <div class="nav-item" onclick="load('ipl')">Cricket / IPL</div>
    <div class="nav-item" onclick="load('f1')">Formula 1</div>
    <div class="nav-item" onclick="load('tech')">Technology</div>
    <div class="nav-item" onclick="load('football')">Soccer</div>
</div>

<div class="main">
    <div class="header">
        <h2 id="viewTitle">All Stories</h2>
        <div style="font-size: 12px; color: var(--dim);" id="updateClock"></div>
    </div>
    
    <div class="feed-container">
        <div id="loader">Waking up the brain...</div>
        <div id="feed" class="grid"></div>
    </div>
</div>

<script>
    const API = "https://rss-engine-core.anu-kompel.workers.dev";

    async function load(cat) {
        const grid = document.getElementById('feed');
        const loader = document.getElementById('loader');
        document.getElementById('viewTitle').innerText = cat.toUpperCase();
        
        grid.innerHTML = '';
        loader.style.display = 'block';

        // Update active sidebar tab
        document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.innerText.toLowerCase().includes(cat)));

        try {
            const url = cat === 'all' ? `${API}/api/news` : `${API}/api/news?sport=${cat}`;
            const res = await fetch(url);
            const items = await res.json();
            
            loader.style.display = 'none';
            items.forEach(a => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => window.open(a.link, '_blank');
                card.innerHTML = `
                    <div class="img-box"><img src="${a.image || 'https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg?auto=compress&cs=tinysrgb&w=600'}" loading="lazy"></div>
                    <div class="body">
                        <div class="source">${a.source || 'RSS CORE'}</div>
                        <div class="title">${a.title}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (e) {
            loader.innerText = "The brain is sleeping. Try again later!";
        }
    }

    // Init
    load('all');
</script>
</body>
</html>
