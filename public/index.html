<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🥭 FeedMango</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    h1 { color: #00d4ff; font-size: 2rem; margin-bottom: 10px; }
    p { color: #888; margin-bottom: 20px; }
    .search-bar { display: flex; gap: 10px; width: 100%; max-width: 700px; }
    input { flex: 1; padding: 12px; background: #16213e; border: 1px solid #00d4ff; color: #e0e0e0; border-radius: 6px; font-size: 15px; }
    button { padding: 12px 24px; background: #00d4ff; color: #1a1a2e; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; white-space: nowrap; }
    button:hover { background: #00b3d4; }
    #status { margin-top: 20px; color: #aaa; font-size: 14px; }
    #output { width: 100%; max-width: 800px; margin-top: 20px; display: flex; flex-direction: column; gap: 16px; }
    .card { background: #16213e; border: 1px solid #0f3460; border-radius: 10px; padding: 20px; transition: transform 0.2s; }
    .card:hover { transform: translateY(-3px); border-color: #00d4ff; }
    .card h2 { font-size: 1rem; color: #00d4ff; margin-bottom: 8px; }
    .card h2 a { color: inherit; text-decoration: none; }
    .card h2 a:hover { text-decoration: underline; }
    .card .date { font-size: 12px; color: #888; margin-bottom: 10px; }
    .card p { font-size: 14px; color: #ccc; line-height: 1.6; }

    .meta { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: bold; background: #0f3460; color: #00d4ff; border: 1px solid #00d4ff; }
    .sentiment { font-size: 13px; }
    .ai-box { margin-top: 10px; padding: 8px; background: #0f3460; border-left: 3px solid #00d4ff; font-size: 13px; color: #a8d8ff; border-radius: 4px; }

.related-section { width: 100%; max-width: 800px; margin-top: 30px; }
    .related-section h3 { color: #00d4ff; margin-bottom: 12px; }
    .related-group { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
    .related-group h4 { font-size: 13px; color: #888; margin-bottom: 8px; }
    .related-group a { display: block; color: #a8d8ff; font-size: 13px; margin-bottom: 4px; text-decoration: none; }
    .related-group a:hover { color: #00d4ff; text-decoration: underline; }
    
    
  </style>
</head>
<body>
  <h1>🥭 FeedMango</h1>
  <p>Enter any RSS feed URL below and click Fetch</p>
  <div class="search-bar">
    <input id="urlInput" type="text" placeholder="e.g. https://feeds.bbci.co.uk/news/rss.xml" />
    <button onclick="fetchFeed()">Fetch Feed</button>
  </div>
  <div id="status"></div>
  <div id="output"></div>
<div id="related-section"></div>
  <script>
    async function fetchFeed() {
      const url = document.getElementById('urlInput').value.trim();
      const output = document.getElementById('output');
      const status = document.getElementById('status');
      if (!url) { status.textContent = '⚠️ Please enter a URL.'; return; }
      status.textContent = '⏳ Loading...';
      output.innerHTML = '';
      try {
        const res = await fetch(`/api/fetch?url=${encodeURIComponent(url)}`);
        const text = await res.text();
        const parser = new DOMParser();
        const xml = parser.parseFromString(text, 'application/xml');
        const items = xml.querySelectorAll('item');
        if (items.length === 0) { status.textContent = '⚠️ No articles found.'; return; }
        status.textContent = `✅ ${items.length} articles loaded`;
        items.forEach(item => {
          const title = item.querySelector('title')?.textContent || 'No title';
          const link = item.querySelector('link')?.textContent || '#';
          const date = item.querySelector('pubDate')?.textContent || '';
          const desc = item.querySelector('description')?.textContent || '';
          const cleanDesc = desc.replace(/<[^>]+>/g, '').slice(0, 200) + '...';
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <h2><a href="${link}" target="_blank">${title}</a></h2>
            <div class="date">📅 ${date}</div>
            <p>${cleanDesc}</p>`;
                    output.appendChild(card);

          // Call AI summarize API for each article and update the card

          fetch(`/api/summarize?title=${encodeURIComponent(title)}&description=${encodeURIComponent(desc)}`)
            .then(r => r.json())
            .then(data => {
              const sentimentEmoji = data.sentiment === 'Positive' ? '😊' : data.sentiment === 'Negative' ? '😟' : '😐';
              const metaDiv = document.createElement('div');
              metaDiv.className = 'meta';
              metaDiv.innerHTML = `<span class="badge">🏷️ ${data.category || 'Other'}</span><span class="sentiment">${sentimentEmoji} ${data.sentiment || 'Neutral'}</span>`;
              card.insertBefore(metaDiv, card.querySelector('.date'));
              const aiDiv = document.createElement('div');
              aiDiv.className = 'ai-box';
              aiDiv.innerHTML = `🤖 <strong>AI Summary:</strong> ${data.summary}`;
              card.appendChild(aiDiv);
            })
            .catch(() => {});
       

        });

        // After showing articles, find related ones using Gemini
        const allTitles = Array.from(document.querySelectorAll('.card h2 a')).map(a => a.textContent);
        if (allTitles.length > 0) {
          const relatedRes = await fetch('/api/related', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ titles: allTitles.slice(0, 20) })
          });
          const relatedData = await relatedRes.json();
          const relSection = document.getElementById('related-section');
          if (relatedData.groups && relatedData.groups.length > 0) {
            relSection.innerHTML = '<h3>🔗 Related Stories</h3>';
            relatedData.groups.forEach((group, i) => {
              if (group.length < 2) return;
              const groupDiv = document.createElement('div');
              groupDiv.className = 'related-group';
              groupDiv.innerHTML = '<h4>Group ' + (i+1) + '</h4>' +
                group.map(idx => {
                  const cardLinks = document.querySelectorAll('.card h2 a');
                  const el = cardLinks[idx];
                  return el ? '<a href="' + el.href + '" target="_blank">' + el.textContent + '</a>' : '';
                }).join('');
              relSection.appendChild(groupDiv);
            });
          }
        }

        
      } catch (err) {
        status.textContent = '❌ Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
