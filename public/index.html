<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🥭 FeedMango Sports</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: Arial, sans-serif; }
    header { background: #16213e; padding: 20px; text-align: center; border-bottom: 2px solid #00d4ff; }
    header h1 { color: #00d4ff; font-size: 1.8rem; }
    header p { color: #888; font-size: 13px; margin-top: 4px; }
    .tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 16px; background: #16213e; }
    .tab { padding: 8px 18px; border-radius: 20px; border: 1px solid #0f3460; background: #1a1a2e; color: #aaa; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    .tab:hover { border-color: #00d4ff; color: #00d4ff; }
    .tab.active { background: #00d4ff; color: #1a1a2e; font-weight: bold; border-color: #00d4ff; }
    #status { text-align: center; padding: 12px; color: #888; font-size: 13px; }
    #output { max-width: 900px; margin: 20px auto; padding: 0 16px; display: flex; flex-direction: column; gap: 14px; }
    .card { background: #16213e; border: 1px solid #0f3460; border-radius: 10px; padding: 18px; transition: transform 0.2s, border-color 0.2s; }
    .card:hover { transform: translateY(-2px); border-color: #00d4ff; }
    .card h2 { font-size: 1rem; margin-bottom: 8px; }
    .card h2 a { color: #00d4ff; text-decoration: none; }
    .card h2 a:hover { text-decoration: underline; }
    .card .meta { font-size: 12px; color: #666; margin-bottom: 8px; }
    .card p { font-size: 13px; color: #bbb; line-height: 1.5; }
    .empty { text-align: center; color: #555; padding: 40px; font-size: 14px; }
    footer { text-align: center; padding: 20px; color: #444; font-size: 12px; margin-top: 30px; }
  </style>
</head>
<body>
  <header>
    <h1>🥭 FeedMango Sports</h1>
    <p>Live sports news — refreshes automatically every 30 minutes</p>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="loadSport('cricket')">🏏 Cricket</div>
    <div class="tab" onclick="loadSport('basketball')">🏀 Basketball</div>
    <div class="tab" onclick="loadSport('football')">⚽ Football</div>
    <div class="tab" onclick="loadSport('tennis')">🎾 Tennis</div>
    <div class="tab" onclick="loadSport('athletics')">🏃 Athletics</div>
    <div class="tab" onclick="loadSport('baseball')">⚾ Baseball</div>
  </div>

  <div id="status">Loading news...</div>
  <div id="output"></div>
  <footer>🥭 FeedMango — Sports news from the world's top sources</footer>

  <script>
    let currentSport = 'cricket';

    function loadSport(sport) {
      currentSport = sport;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      fetchNews(sport);
    }

    async function fetchNews(sport) {
      const status = document.getElementById('status');
      const output = document.getElementById('output');
      status.textContent = 'Loading ' + sport + ' news...';
      output.innerHTML = '';
      try {
        const res = await fetch('https://mango-sports-worker.ravi-kompel.workers.dev/api/news?sport=' + sport);
        const data = await res.json();
        const articles = data.articles || [];
        if (articles.length === 0) {
          output.innerHTML = '<div class="empty">No news yet. The background job will fetch news shortly. Try again in a minute!</div>';
          status.textContent = '';
          return;
        }
        status.textContent = '✅ ' + articles.length + ' articles loaded';
        articles.forEach(article => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML =
            '<h2><a href="' + article.link + '" target="_blank">' + article.title + '</a></h2>' +
            '<div class="meta">📅 ' + (article.pubDate ? new Date(article.pubDate).toLocaleDateString() : '') + ' &nbsp;|&nbsp; 🔗 ' + article.source + '</div>' +
            '<p>' + (article.description || '') + '</p>';
          output.appendChild(card);
        });
      } catch (err) {
        status.textContent = '❌ Error: ' + err.message;
      }
    }

    // Load cricket on page open
    fetchNews('cricket');

    // Auto-refresh every 30 minutes
    setInterval(() => fetchNews(currentSport), 30 * 60 * 1000);
  </script>
</body>
</html>
