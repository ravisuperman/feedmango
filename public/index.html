<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTSrip — Intelligence Sync in Progress</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --primary: #06b6d4;
            --accent: #10b981;
            --glass: rgba(15, 23, 42, 0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image: url('file:///C:/Users/ravik/.gemini/antigravity/brain/61e298ab-0c6f-4363-b4cc-1692dccebb54/sportsrip_sync_maintenance_v1_1774881086040.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }
        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid rgba(6, 182, 212, 0.2);
            text-align: center;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }
        h1 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #06b6d4, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 18px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .loader-hub {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
        }
        .pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite ease-in-out;
        }
        .inner {
            position: absolute;
            top: 25%;
            left: 25%;
            width: 50%;
            height: 50%;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--accent);
        }
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 0.1; }
            100% { transform: scale(0.8); opacity: 0.8; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 20px;
            color: var(--accent);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="badge">System Optimization</div>
    <div class="loader-hub">
        <div class="pulse"></div>
        <div class="inner"></div>
    </div>
    <h1>Syncing Elite Data</h1>
    <p>We are currently establishing a high-fidelity intelligence loop to bring you the best sports feeds. <br>Our engine is processing 2026 data—<strong>the wait won't be long.</strong></p>
</div>

</body>
</html>
